  '=== SECTION 9: BORROW CHECKER (compile-time safety rules) ===': "\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500"
  BorrowChecker:
    kind: specification
    description: "Compile-time enforcement of the S6 ownership model. The borrow checker\
      \ runs on the AST after type checking. It tracks every reference's scope, exclusivity,\
      \ and lifetime \u2014 rejecting any program that violates memory safety. No\
      \ runtime checks. No garbage collector."
    rules:
    - id: E2420
      name: UseAfterMove
      severity: error
      description: "A value that has been moved (ownership transferred via `&+` or\
        \ `owned`) is used again. Tri\u1EBFt tracks move sites and marks the source\
        \ binding dead."
      example_bad: 'let x = &+ buffer; let y = x; let z = x;  // E2420: x was moved
        into y'
      status: SHIPPED v0.9
    - id: E2440
      name: NllExclusivityViolation
      severity: error
      description: "Two mutable references (`&0 mutable` or `&+ mutable`) to the same\
        \ value exist simultaneously. Or a mutable reference coexists with any other\
        \ reference. Non-Lexical Lifetime (NLL) determines when borrows actually end\
        \ \u2014 not block scope, but last use."
      example_bad: let b1 = &0 mutable x; let b2 = &0 mutable x;  // E2440
      status: SHIPPED v0.10
    - id: E2400
      name: LifetimeInferenceFailure
      severity: error
      description: "A borrow's lifetime cannot be proven to outlive a use. Tri\u1EBF\
        t uses 3-rule lifetime elision (ADR-0025 \xA76): (1) each elided parameter\
        \ gets its own lifetime, (2) if there is exactly one input lifetime, assign\
        \ it to all output lifetimes, (3) if there are multiple input lifetimes but\
        \ one is `self`, assign `self`'s lifetime to all output lifetimes. If elision\
        \ cannot resolve, the compiler requests explicit lifetime annotation (rare\
        \ \u2014 <5% of cases in practice)."
      status: SHIPPED v0.10
    - id: E2403
      name: WeakUpgradeFailure
      severity: error
      description: An attempt to upgrade `&- T` to `&0 T` where the owner's lifetime
        cannot be proven to outlive the upgrade site.
      status: DEFERRED v0.11+
    - id: E2410
      name: MutabilityViolation
      severity: error
      description: Mutation through a non-mutable reference. Assigning to a field
        declared without `mutable`. Writing through `&0 T` (read-only borrow) instead
        of `&0 mutable T`.
      status: DEFERRED v0.11+
  '=== SECTION 10: HARDWARE TOKEN (kernel-mode singleton) ===': "\u2500\u2500\u2500\
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500"
  HardwareToken:
    kind: specification
    description: "Capability security via S6 ownership \u2014 ZERO runtime overhead.\
      \ Hardware resources are represented as ZST (Zero-Sized Type) tokens at compile\
      \ time. The borrow checker enforces exclusive access via move semantics. At\
      \ runtime, all tokens vanish (0 bytes) \u2014 only the driver's hardcoded hardware\
      \ addresses remain. This is the same principle as Rust's zero-cost abstractions:\
      \ the type system proves safety, the CPU sees raw pointers."
    how_it_works:
      step1: 'Hardware resources are ZST structs: `public struct VgaBuffer {}` (sizeof
        = 0).'
      step2: "The Hardware struct aggregates ZST tokens. Since all fields are ZST,\
        \ Hardware itself is ZST \u2014 pass-by-value copies 0 bytes."
      step3: "Resources are extracted via destructuring: `let vga: VgaBuffer = hw.vga`\
        \ \u2014 this is a MOVE at compile time, but copies 0 bytes at runtime."
      step4: "After move, the source field is dead. `hw.vga` cannot be accessed again\
        \ \u2014 E2420 UseAfterMove."
      step5: 'Dynamic resources (delegation) use small metadata structs: `VgaRegion
        { base: &0 mutable VgaBuffer, offset_x, offset_y, width, height }`. Only metadata
        is copied (40 bytes), not the buffer.'
      step6: No ACL, no syscall, no runtime check. No exception unwinding (kernel
        panic = abort).
    why_no_special_ast_node:
      principle: "Hardware access uses standard language constructs: struct destructuring,\
        \ pass-by-value, borrows. The borrow checker enforces exclusivity \u2014 no\
        \ parser magic needed."
      precedent: C has no VgaBufferNode in its AST. Rust has no FileDescriptor AST
        node. A struct field access is a struct field access.
    entry_point:
      signature: 'public function kernel_main(hw: Hardware) -> Unit'
      note: Hardware is passed by value. Since all fields are ZST, this copies 0 bytes.
        The exact entry point name is platform-dependent (multiboot, UEFI, etc.).
    example:
    - "// All hardware resource types are ZST \u2014 compile-time tokens only"
    - 'public struct VgaBuffer {}       // ZST: sizeof = 0'
    - 'public struct UartPort {}        // ZST: sizeof = 0'
    - ''
    - "// Hardware aggregates ZST tokens \u2014 itself ZST"
    - public struct Hardware {
    - '    vga: VgaBuffer,'
    - '    uart: UartPort,'
    - '}'
    - ''
    - // ---- kernel entry point ----
    - 'public function kernel_main(hw: Hardware) -> Unit {'
    - '    // Destructure: move ZST fields out of hw (0 bytes copied)'
    - '    let vga: VgaBuffer = hw.vga;'
    - '    let uart: UartPort = hw.uart;'
    - "    // hw consumed \u2014 ZST, no drop code"
    - ''
    - '    // Each driver receives a ZST token'
    - "    vga_driver(vga);     // vga MOVED \u2014 compile-time, 0 bytes"
    - '    uart_driver(uart);'
    - ''
    - "    // vga_driver(vga);  // E2420 UseAfterMove \u2014 compile-time error!"
    - '    loop {};'
    - '}'
    design_properties:
    - 'Zero-cost: hardware tokens are ZST at runtime, 0 bytes copied.'
    - 'Compile-time: borrow checker proves each resource taken exactly once.'
    - "No ACL, no syscall, no runtime check \u2014 capability = ownership."
    - "No exception unwinding \u2014 kernel panic = abort (no destructors)."
    - 'Platform-agnostic: Hardware struct defined per-platform; type system is universal.'
    - 'Extensible: new driver = new ZST field + destructure. No parser changes.'
