  Program:
    kind: struct
    description: "Root of a Tri\u1EBFt compilation unit. Owns its Arena \u2014 all\
      \ AST nodes live here. This is the parser's output and the type checker's input."
    fields:
    - name: arena
      type: Arena
      ownership: owned
    - name: items
